[tool.poetry]
name = "rehome"
version = "0.1.0"
description = ""
authors = ["Lee Watson <rev@revthefox.co.uk>"]

[tool.poetry.dependencies]
python = "^3.9"
Flask = "^2.0.1"
python-dotenv = "^0.18.0"
gunicorn = { version = "^20.1.0", extras = ["gevent"] }
dotty-dict = "^1.3.0"
Flask-Assets = "^2.0"
cssmin = "^0.2.0"
libsass = "^0.21.0"
Flask-DB = "^0.3.2"
SQLAlchemy = {extras = ["postgresql"], version = "^1.4.19"}
dynaconf = {extras = ["yaml"], version = "^3.1.4"}

[tool.poetry.dev-dependencies]
black = "^21.6b0"
pre-commit = "^2.13.0"
flake8 = "^3.9.2"
isort = "^5.9.1"

[tool.black]
exclude = '^(data/)'

[tool.isort]
profile = "black"
src_paths = ["rehome"]
extend_skip = ["data/"]


[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
