[tool.poetry]
name = "rehome"
version = "0.6.0"
description = "A very minimal CMS"
authors = ["Lee Watson <me@lwatson.dev>"]

[tool.poetry.dependencies]
python = "^3.11"
Flask = "^3.0.0"
python-dotenv = "^1.0.0"
gunicorn = { version = "^21.2.0", extras = ["gevent"] }
cssmin = "^0.2.0"
libsass = "^0.22.0"
Flask-DB = "^0.4.0"
SQLAlchemy = { extras = ["postgresql"], version = "^2.0.0" }
dynaconf = { extras = ["yaml"], version = "^3.1.4" }
sentry-sdk = { extras = ["flask"], version = "^1.5.0" }
gevent = "^23.9.0"
flask-assets = "^2.0"

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.0.0"
Flask-DebugToolbar = "^0.13.0"
ruff = "^0.1.0"
pre-commit-hooks = "^4.5.0"

[tool.ruff]
target-version = "py311"
force-exclude = true

select = [
    "A",
    "B",
    "BLE",
    "C90",
    "E",
    "ERA",
    "F",
    "FIX",
    "I",
    "N",
    "PL",
    "PTH",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SIM",
    "T20",
    "UP",
    "W",
    "YTT",
]

# ruff format compatibility
ignore = [
    "E501",
    "W191",
]

extend-exclude = [
    "data/",
]

[tool.ruff.extend-per-file-ignores]
"rehome/db/migrations/*" = ["ERA001"]

[tool.ruff.format]
line-ending = "lf"

[build-system]
requires = ["poetry-core>=1.3.0"]
build-backend = "poetry.core.masonry.api"
