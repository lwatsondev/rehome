[project]
name = "rehome"
description = ""
authors = [{ name = "Lee Watson", email = "me@lwatson.dev" }]
version = "1.3.18"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "flask (>=3.0.0,<4.0.0)",
    "gunicorn[gevent]>=23.0.0",
    "flask-db>=0.4.1",
    "flask-httpauth>=4.8.0",
    "flask-wtf>=1.2.2",
    "libgravatar>=1.0.4",
    "python-dotenv>=1.1.0",
    "python-magic>=0.4.27",
    "sentry-sdk[flask,sqlalchemy]>=2.27.0",
    "dynaconf>=3.2.10",
    "flask-sqlalchemy-lite>=0.1.0",
]

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
    "pre-commit-hooks>=5.0.0",
    "ruff>=0.11.7",
    "shellcheck-py>=0.10.0.1",
    "flask-debugtoolbar>=0.16.0",
]

[tool.ruff]
force-exclude = true
extend-exclude = ["docker/data/", "docker/config/"]

[tool.ruff.lint]
select = [
    "A",
    "ARG",
    "B",
    "BLE",
    "C4",
    "C90",
    "DTZ",
    "E",
    "ERA",
    "F",
    "FIX",
    "FURB",
    "I",
    "N",
    "PL",
    "PTH",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SIM",
    "SLF",
    "T10",
    "T20",
    "TID",
    "UP",
    "W",
    "YTT",
]

# ruff format compatibility
ignore = ["E501"]

[tool.ruff.format]
line-ending = "lf"
