[tool.poetry]
name = "rehome"
version = "0.3.16"
description = "A very minimal CMS"
authors = ["Lee Watson <me@lwatson.dev>"]

[tool.poetry.dependencies]
python = "^3.9"
Flask = "^2.0.1"
python-dotenv = "^0.19.0"
gunicorn = { version = "^20.1.0", extras = ["gevent"] }
Flask-Assets = "^2.0"
cssmin = "^0.2.0"
libsass = "^0.21.0"
Flask-DB = "^0.3.2"
SQLAlchemy = { extras = ["postgresql"], version = "^1.4.19" }
dynaconf = { extras = ["yaml"], version = "^3.1.4" }
sentry-sdk = { extras = ["flask"], version = "^1.5.0" }

[tool.poetry.dev-dependencies]
black = "^21.12b0"
pre-commit = "^2.16.0"
flake8 = "^4.0.1"
isort = "^5.9.1"
flake8-bandit = "^2.1.2"
flake8-bugbear = "^22.1.0"

[tool.black]
exclude = '^(data/)'

[tool.isort]
profile = "black"
src_paths = ["rehome"]
extend_skip = ["data/"]


[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
