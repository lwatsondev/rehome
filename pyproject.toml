[tool.poetry]
name = "rehome"
version = "0.7.7"
description = "A very minimal CMS"
authors = ["Lee Watson <me@lwatson.dev>"]

[tool.poetry.dependencies]
python = "^3.12"
Flask = "^3.0.0"
python-dotenv = "^1.0.0"
gunicorn = { version = "^21.2.0", extras = ["gevent"] }
cssmin = "^0.2.0"
libsass = "^0.23.0"
Flask-DB = "^0.4.0"
SQLAlchemy = { extras = ["postgresql"], version = "^2.0.0" }
dynaconf = { extras = ["yaml"], version = "^3.2.4" }
sentry-sdk = { extras = ["flask"], version = "^1.5.0" }
gevent = "^24.2.1"
flask-assets = "^2.0"
psycopg = "^3.1.18"

[tool.poetry.group.dev.dependencies]
pre-commit = "^3.5.0"
Flask-DebugToolbar = "^0.14.0"
ruff = "^0.3.0"
pre-commit-hooks = "^4.5.0"
shellcheck-py = "^0.9.0.6"

[tool.ruff]
target-version = "py312"
force-exclude = true
extend-exclude = [
    "data/",
]

[tool.ruff.lint]
select = [
    "A",
    "ARG",
    "B",
    "BLE",
    "C4",
    "C90",
    "DTZ",
    "E",
    "ERA",
    "F",
    "FIX",
    # "FURB",
    "I",
    "N",
    "PL",
    "PTH",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SIM",
    "SLF",
    "T10",
    "T20",
    "TID",
    "UP",
    "W",
    "YTT",
]

# ruff format compatibility
ignore = [
    "E501"
]

[tool.ruff.lint.extend-per-file-ignores]
"rehome/db/migrations/*" = ["ERA001", "ARG001"]

[tool.ruff.format]
line-ending = "lf"

[build-system]
requires = ["poetry-core>=1.3.0"]
build-backend = "poetry.core.masonry.api"
