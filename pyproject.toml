[project]
name = "rehome"
description = ""
authors = [{ name = "Lee Watson", email = "me@lwatson.dev" }]
version = "1.2.6"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "flask (>=3.0.0,<4.0.0)",
    "python-dotenv (>=1.0.0,<2.0.0)",
    "gunicorn[gevent] (>=23.0.0,<24.0.0)",
    "dynaconf (>=3.2.4,<4.0.0)",
    "sentry-sdk[flask] (>=2.8.0,<3.0.0)",
    "libgravatar (>=1.0.4,<2.0.0)",
    "flask-wtf (>=1.2.2,<1.3)",
    "python-magic (>=0.4.0,<1.0.0)",
    "flask-migrate (>=4.1.0,<5.0.0)",
    "flask-httpauth (>=4.8.0,<5.0.0)",
    "flask-sqlalchemy (>=3.1.1,<4.0.0)",
]

[dependency-groups]
dev = [
    "pre-commit (>=4.0.0,<5.0.0)",
    "pre-commit-hooks (>=5.0.0,<6.0.0)",
    "ruff (>=0.9.0,<1.0.0)",
    "shellcheck-py (>=0.10.0.1)",
    "flask-debugtoolbar (>=0.14.0,<1.0.0)",
]

[tool.ruff]
force-exclude = true
extend-exclude = ["docker/data/", "docker/config/"]

[tool.ruff.lint]
select = [
    "A",
    "ARG",
    "B",
    "BLE",
    "C4",
    "C90",
    "DTZ",
    "E",
    "ERA",
    "F",
    "FIX",
    "FURB",
    "I",
    "N",
    "PL",
    "PTH",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SIM",
    "SLF",
    "T10",
    "T20",
    "TID",
    "UP",
    "W",
    "YTT",
]

# ruff format compatibility
ignore = ["E501"]

[tool.ruff.lint.extend-per-file-ignores]
"rehome/db/migrations/*" = ["ERA001", "ARG001"]

[tool.ruff.format]
line-ending = "lf"
