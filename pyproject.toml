[tool.poetry]
name = "rehome"
version = "0.6.0"
description = "A very minimal CMS"
authors = ["Lee Watson <me@lwatson.dev>"]

[tool.poetry.dependencies]
python = "^3.11"
Flask = "^2.2.0"
python-dotenv = "^0.21.0"
gunicorn = { version = "^20.1.0", extras = ["gevent"] }
Flask-Assets = "^2.0"
cssmin = "^0.2.0"
libsass = "^0.22.0"
Flask-DB = "^0.3.2"
SQLAlchemy = { extras = ["postgresql"], version = "^1.4.19" }
dynaconf = { extras = ["yaml"], version = "^3.1.4" }
sentry-sdk = { extras = ["flask"], version = "^1.5.0" }
gevent = "22.10.2"

[tool.poetry.group.dev.dependencies]
black = "^22.1.0"
pre-commit = "^2.16.0"
flake8 = "^6.0.0"
isort = "^5.9.1"
Flask-DebugToolbar = "^0.13.0"
pyupgrade = "^3.3.1"

[tool.black]
extend-exclude = '^/data'

[tool.isort]
profile = "black"
src_paths = ["rehome"]
extend_skip = ["data/"]

[build-system]
requires = ["poetry-core>=1.3.0"]
build-backend = "poetry.core.masonry.api"
