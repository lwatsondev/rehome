[project]
name = "rehome"
description = ""
authors = [{ name = "Lee Watson", email = "<me@lwatson.dev>" }]
version = "0.8.1"
readme = "README.md"
requires-python = ">=3.13"
dynamic = ["dependencies"]

[tool.poetry]
package-mode = false
requires-poetry = ">=2.0"

[tool.poetry.dependencies]
Flask = "^3.0.0"
python-dotenv = "^1.0.0"
gunicorn = { version = "^23.0.0", extras = ["gevent"] }
cssmin = "^0.2.0"
libsass = "^0.23.0"
Flask-DB = "^0.4.0"
SQLAlchemy = { extras = ["postgresql"], version = "^2.0.0" }
dynaconf = { extras = ["yaml"], version = "^3.2.4" }
sentry-sdk = { extras = ["flask"], version = "^2.8.0" }
gevent = "^24.2.1"
flask-assets = "^2.0"
psycopg = "^3.1.18"
libgravatar = "^1.0.4"

[tool.poetry.group.dev.dependencies]
pre-commit = "^4.0.0"
Flask-DebugToolbar = "^0.14.0"
ruff = "^0.9.0"
pre-commit-hooks = "^5.0.0"
shellcheck-py = "^0.10.0.1"

[tool.ruff]
force-exclude = true
extend-exclude = ["data/"]

[tool.ruff.lint]
select = [
    "A",
    "ARG",
    "B",
    "BLE",
    "C4",
    "C90",
    "DTZ",
    "E",
    "ERA",
    "F",
    "FIX",
    "FURB",
    "I",
    "N",
    "PL",
    "PTH",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SIM",
    "SLF",
    "T10",
    "T20",
    "TID",
    "UP",
    "W",
    "YTT",
]

# ruff format compatibility
ignore = ["E501"]

[tool.ruff.lint.extend-per-file-ignores]
"rehome/db/migrations/*" = ["ERA001", "ARG001"]

[tool.ruff.format]
line-ending = "lf"

[build-system]
requires = ["poetry-core>=2.0"]
build-backend = "poetry.core.masonry.api"
