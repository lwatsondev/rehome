repos:
  - repo: https://github.com/psf/black
    rev: '21.6b0'
    hooks:
      - id: black
        exclude: |
          (?x)(
              ^rehome/storage/|
              ^rehome/db/migrations/
          )
        args:
          - '--check'
  - repo: https://gitlab.com/pycqa/flake8
    rev: '3.9.2'
    hooks:
      - id: flake8
        exclude: |
          (?x)(
              ^rehome/storage/|
              ^rehome/db/migrations/
          )
