---
name: "rehome"

services:
  rehome:
    container_name: "rehome"
    restart: "no"
    init: true
    read_only: true
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - path: ".env"
        required: false
    environment:
      TZ: "${TZ:-UTC}"
      CFG_SECRET_KEY: "dev"
      CFG_AUTH__TOKEN: "dev"
    volumes:
      - "./config:/config"
      - "./data:/data"
      - "../:/app"
    tmpfs:
      - "/tmp"
    networks:
      - "rehome"
    ports:
      - "5000:5000"
    build:
      context: "../"
      dockerfile: "docker/Dockerfile"
      target: "development"
    deploy:
      resources:
        limits:
          cpus: "${REHOME_CPU_LIMIT:-${CPU_LIMIT:-0}}"
          memory: "${REHOME_MEM_LIMIT:-${MEM_LIMIT:-0}}"

  test:
    extends:
      service: "rehome"
    container_name: "rehome-test"
    entrypoint: []
    command: ["uv", "run", "pytest"]
    ports: []
    environment:
      UV_NO_CACHE: "1"
    profiles:
      - "test"

networks:
  rehome:
