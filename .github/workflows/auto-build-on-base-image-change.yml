name: Check for base image updates and rebuild Docker image

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for base image updates
        id: updatecheck
        uses: mkumatag/container-image-updater-action@v1
        with:
          base-image: python:latest
          image: $${{ env.REGISTRY }}/{{ env.IMAGE_NAME }}:${{ github.branch }}
          image-reg-username: ${{ github.actor }}
          image-reg-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the container registry
        uses: docker/login-action@v3
        if: steps.updatecheck.outputs.needs-updating == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        if: steps.updatecheck.outputs.needs-updating == 'true'
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        if: steps.updatecheck.outputs.needs-updating == 'true'
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
